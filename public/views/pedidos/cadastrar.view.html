<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Novo Pedido</title>

<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/pedido.css">
</head>

<body>

<main>

<section class="pedidos-section">

<div class="section-header">
<h2>Criar Novo Pedido</h2>
</div>

<form class="form-pedido" id="formPedido">

<div class="form-group">
<label for="idCliente">Cliente:</label>

<select id="idCliente" required>
<option value="">Carregando clientes...</option>
</select>

</div>


<div class="form-group">

<label for="local">Local da Entrega:</label>

<input
type="text"
id="local"
required
placeholder="Digite o local da entrega">

</div>


<fieldset class="form-section">

<legend>Itens do Pedido</legend>

<div id="itens-container">

<div class="item-pedido" data-index="0">

<div class="form-group-inline">

<div class="form-group">

<label>Produto:</label>

<select class="select-produto" required>
<option value="">Carregando produtos...</option>
</select>

</div>

<div class="form-group">

<label>Quantidade:</label>

<input
type="number"
class="input-quantidade"
min="1"
value="1"
required>

</div>

<button type="button" class="btn btn-danger btn-small btn-remove-item">
Remover
</button>

</div>
</div>
</div>

<button type="button" class="btn btn-secondary" id="addItem">
+ Adicionar Item
</button>

</fieldset>


<div class="form-group resumo-pedido">

<label>Total do Pedido:</label>

<div id="calculo-total" class="resumo-item total">
<span>R$ 0,00</span>
</div>

</div>


<div class="form-actions">

<button type="submit" class="btn btn-primary" id="btnSalvar">
Salvar Pedido
</button>

<a href="/pedidos" class="btn btn-secondary">
Cancelar
</a>

</div>

</form>

</section>

</main>

<script type="module">

const apiService = window.apiService

let produtosData = []
let clientesData = []
let itemCount = 1


async function inicializar() {

try {

const [clientes, produtos] = await Promise.all([
apiService.listarClientes(),
apiService.listarProdutos()
])

clientesData = clientes || []
produtosData = produtos || []

popularClientes()
popularProdutos()

} catch (error) {

console.error("Erro ao inicializar:", error)

alert("Erro ao carregar dados da API")

}

}


function popularClientes() {

const select = document.getElementById("idCliente")

select.innerHTML = '<option value="">Selecione um cliente</option>'

clientesData.forEach(cliente => {

const option = document.createElement("option")

option.value = cliente.idCliente
option.textContent = cliente.nomeCliente

select.appendChild(option)

})

}


function popularProdutos() {

const selects = document.querySelectorAll(".select-produto")

selects.forEach(select => {

select.innerHTML = '<option value="">Selecione um produto</option>'

produtosData.forEach(produto => {

const id = produto.idProduto || produto.id

if (!id) return

const option = document.createElement("option")

option.value = id
option.dataset.preco = produto.preco

option.textContent =
`${produto.nome} (R$ ${Number(produto.preco).toFixed(2)})`

select.appendChild(option)

})

})

}


function atualizarTotal() {

let total = 0

document.querySelectorAll(".item-pedido").forEach(item => {

const select = item.querySelector(".select-produto")
const quantidadeInput = item.querySelector(".input-quantidade")

if (!select || !quantidadeInput) return

const produtoId = select.value
const quantidade = parseInt(quantidadeInput.value) || 0

if (produtoId) {

const produto = produtosData.find(p =>
(p.idProduto || p.id) == produtoId
)

if (produto) {
total += Number(produto.preco) * quantidade
}

}

})

document.querySelector("#calculo-total span")
.textContent = `R$ ${total.toFixed(2).replace(".", ",")}`

}


document.getElementById("addItem").addEventListener("click", () => {

const container = document.getElementById("itens-container")

const item = document.createElement("div")

item.className = "item-pedido"

item.innerHTML = `

<div class="form-group-inline">

<div class="form-group">

<label>Produto:</label>

<select class="select-produto" required></select>

</div>

<div class="form-group">

<label>Quantidade:</label>

<input type="number" class="input-quantidade" min="1" value="1">

</div>

<button type="button" class="btn btn-danger btn-small btn-remove-item">
Remover
</button>

</div>

`

container.appendChild(item)

popularProdutos()

item.querySelector(".select-produto")
.addEventListener("change", atualizarTotal)

item.querySelector(".input-quantidade")
.addEventListener("input", atualizarTotal)

item.querySelector(".btn-remove-item")
.addEventListener("click", () => {

item.remove()

atualizarTotal()

})

})


document.querySelector(".select-produto")
.addEventListener("change", atualizarTotal)

document.querySelector(".input-quantidade")
.addEventListener("input", atualizarTotal)


document.getElementById("formPedido")
.addEventListener("submit", async (e) => {

e.preventDefault()

const btn = document.getElementById("btnSalvar")

btn.disabled = true
btn.textContent = "Salvando..."

try {

const itens = []

document.querySelectorAll(".item-pedido").forEach(item => {

const produto = item.querySelector(".select-produto").value
const qtd = item.querySelector(".input-quantidade").value

if (produto && qtd) {

itens.push({
idProduto: parseInt(produto),
quantidade: parseInt(qtd)
})

}

})

if (itens.length === 0) {
throw new Error("Adicione pelo menos um produto")
}

const pedido = {

idCliente: parseInt(document.getElementById("idCliente").value),

local: document.getElementById("local").value,

itens

}

await apiService.criarPedido(pedido)

alert("Pedido criado com sucesso!")

window.location.href = "/pedidos"

} catch (error) {

console.error(error)

alert("Erro ao criar pedido:\n" + error.message)

}

btn.disabled = false
btn.textContent = "Salvar Pedido"

})


inicializar()

</script>

</body>
</html>
