<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listar Clientes</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/cliente.css">
</head>
<body>
  <main>
    <section class="clientes-section">
      <div class="section-header">
        <h2>Lista de Clientes</h2>
        <a href="/clientes/cadastrar" class="btn btn-primary">+ Novo Cliente</a>
      </div>

      <div class="table-container" style="display: none;">
        <table class="table table-clientes">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Contato</th>
              <th>Documento</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="empty-state" style="display: none;">
        <p>Nenhum cliente cadastrado.</p>
        <a href="/clientes/cadastrar" class="btn btn-primary">Criar Cliente</a>
      </div>
    </section>
  </main>

  <script type="module">
    import apiService from '/js/api/api.service.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const tableBody = document.querySelector('.table-clientes tbody');
      const emptyState = document.querySelector('.empty-state');
      const tableContainer = document.querySelector('.table-container');

      try {
        const clientes = await apiService.listarClientes();
        if (clientes && clientes.length > 0) {
          if (emptyState) emptyState.style.display = 'none';
          if (tableContainer) tableContainer.style.display = 'block';
          let html = '';
          clientes.forEach(cliente => {
            html += `
              <tr>
                <td>${cliente.idCliente}</td>
                <td>${cliente.nomeCliente}</td>
                <td>${cliente.contato}</td>
                <td>${cliente.documento}</td>
                <td class="actions">
                  <a href="/clientes/${cliente.idCliente}/editar" class="btn btn-warning btn-small">Editar</a>
                  <button class="btn btn-danger btn-small delete-btn" data-id="${cliente.idCliente}">Deletar</button>
                </td>
              </tr>
            `;
          });
          if (tableBody) { tableBody.innerHTML = html; attachDeleteListeners(); }
        } else { if (tableContainer) tableContainer.style.display = 'none'; if (emptyState) emptyState.style.display = 'block'; }
      } catch (error) { console.error('Erro ao carregar clientes:', error); alert('Erro ao carregar a lista de clientes: ' + error.message); }
    });

    function attachDeleteListeners() {
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async function () {
          const id = this.dataset.id;
          if (confirm('Confirmar exclusão deste cliente?')) {
            try { await apiService.deletarCliente(id); alert('Cliente deletado com sucesso!'); location.reload(); }
            catch (error) { console.error('Erro:', error); alert('Erro ao deletar cliente: ' + error.message); }
          }
        });
      });
    }
  </script>
</body>
</html>
