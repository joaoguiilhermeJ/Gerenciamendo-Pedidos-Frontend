<section class="clientes-section">
    <div class="section-header">
        <h2>Cadastrar Novo Cliente</h2>
    </div>

    <form class="form-cliente" id="formCliente" action="javascript:void(0)">
        <div class="form-group">
            <label for="nomeCliente">Nome Completo:</label>
            <input type="text" id="nomeCliente" name="nomeCliente" required placeholder="Digite o nome do cliente">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="contato">E-mail:</label>
                <input type="email" id="contato" name="contato" required placeholder="Ex: exemplo@email.com">
            </div>

            <div class="form-group">
                <label for="documento">CPF/CNPJ:</label>
                <input type="text" id="documento" name="documento" required placeholder="Digite o documento">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar Cliente</button>
            <a href="/clientes" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</section>

<script type="module">
    import apiService from '/js/api/api.service.js';

    const form = document.getElementById('formCliente');
    if (form) {
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btnSalvar = document.getElementById('btnSalvar');
            btnSalvar.disabled = true;
            btnSalvar.textContent = 'Salvando...';

            const dados = {
                nomeCliente: document.getElementById('nomeCliente').value,
                contato: document.getElementById('contato').value,
                documento: document.getElementById('documento').value
            };

            try {
                await apiService.criarCliente(dados);
                   alert('Cliente cadastrado com sucesso!');
                   try {
                       if (window.navigateTo) {
                           window.navigateTo('/clientes');
                       } else {
                           window.location.href = '/clientes';
                       }
                   } catch (navError) {
                       console.error('Erro ao navegar:', navError);
                       window.location.href = '/clientes';
                   }
            } catch (error) {
                console.error('Erro:', error);
                   alert('Erro ao cadastrar cliente:\n' + (error?.message || String(error)));
            } finally {
                btnSalvar.disabled = false;
                btnSalvar.textContent = 'Salvar Cliente';
            }
        });
    }
</script>
