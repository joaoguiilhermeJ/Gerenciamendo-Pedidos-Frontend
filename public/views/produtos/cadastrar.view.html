<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/produto.css">
</head>

<body>
    <main>
        <section class="produtos-section">
            <div class="section-header">
                <h2>Cadastrar Novo Produto</h2>
            </div>

            <form class="form-produto" id="formProduto">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nomeProduto">Nome do Produto:</label>
                        <input type="text" id="nomeProduto" name="nomeProduto" required
                            placeholder="Digite o nome do produto">
                    </div>

                    <div class="form-group">
                        <label for="tipo">Categoria/Tipo:</label>
                        <input type="text" id="tipo" name="tipo" required placeholder="Digite a categoria">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="valor">Preço (R$):</label>
                        <input type="number" id="valor" name="valor" min="0" step="0.01" required placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label for="quantidade">Estoque:</label>
                        <input type="number" id="quantidade" name="quantidade" min="0" required placeholder="0">
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <label for="status">
                        <input type="checkbox" id="status" name="status" checked>
                        Produto Ativo
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar Produto</button>
                    <a href="/produtos" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </section>

        <script type="module">
            import apiService from '/js/api/api.service.js';

            const form = document.getElementById('formProduto');
            if (form) {
                form.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    const btnSalvar = document.getElementById('btnSalvar');
                    btnSalvar.disabled = true;
                    btnSalvar.textContent = 'Salvando...';

                    const dados = {
                        nome: document.getElementById('nomeProduto').value,
                        categoria: document.getElementById('tipo').value,
                        preco: parseFloat(document.getElementById('valor').value),
                        estoque: parseInt(document.getElementById('quantidade').value),
                        status: document.getElementById('status').checked ? true : false
                    };

                    try {
                        await apiService.criarProduto(dados);
                        alert('Produto cadastrado com sucesso!');
                        try {
                            if (window.navigateTo) {
                                window.navigateTo('/produtos');
                            } else {
                                window.location.href = '/produtos';
                            }
                        } catch (navError) {
                            console.error('Erro ao navegar:', navError);
                            window.location.href = '/produtos';
                        }
                    } catch (error) {
                        console.error('Erro:', error);
                        alert('Erro ao cadastrar:\n' + (error?.message || String(error)));
                    } finally {
                        btnSalvar.disabled = false;
                        btnSalvar.textContent = 'Salvar Produto';
                    }
                });

                const valorInput = document.getElementById('valor');
                if (valorInput) {
                    valorInput.addEventListener('blur', function (e) {
                        let value = parseFloat(e.target.value);
                        if (!isNaN(value)) {
                            e.target.value = value.toFixed(2);
                        }
                    });
                }
            }
        </script>
    </main>
</body>

</html>
