<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/produto.css">
</head>
<body>
    <main>
        <section class="produtos-section">
            <div class="section-header">
                <h2>Lista de Produtos</h2>
                <a href="/produtos/cadastrar" class="btn btn-primary">+ Novo Produto</a>
            </div>

            <div id="loading" class="text-center">Carregando produtos...</div>

            <div class="table-container" id="tableContainer" style="display: none;">
                <table class="table table-produtos">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Descrição</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="produtosTableBody">
                        <!-- Preenchido via JS -->
                    </tbody>
                </table>
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <p>Nenhum produto cadastrado.</p>
                <a href="/produtos/cadastrar" class="btn btn-primary">Criar Primeiro Produto</a>
            </div>
        </section>

        <script type="module">
            const apiService = window.apiService;

            async function carregarProdutos() {
                const loading = document.getElementById('loading');
                const tableContainer = document.getElementById('tableContainer');
                const emptyState = document.getElementById('emptyState');
                const tbody = document.getElementById('produtosTableBody');

                if (!loading || !tableContainer || !tbody) return;

                try {
                    const produtos = await apiService.listarProdutos();
                    loading.style.display = 'none';

                    if (produtos && produtos.length > 0) {
                        tableContainer.style.display = 'block';
                        emptyState.style.display = 'none';
                        tbody.innerHTML = '';
                        produtos.forEach(produto => {
                            const tr = document.createElement('tr');
                            const valor = Number(produto.preco).toFixed(2);
                            const estoqueClass = produto.estoque > 0 ? 'estoque-disponivel' : 'estoque-indisponivel';
                            const statusClass = produto.status ? 'status-ativo' : 'status-inativo';
                            const statusLabel = produto.status ? 'Ativo' : 'Inativo';

                            tr.innerHTML = `
                                <td>${produto.id}</td>
                                <td>${produto.nome}</td>
                                <td>${produto.categoria || 'N/A'}</td>
                                <td>R$ ${valor}</td>
                                <td>
                                    <span class="estoque ${estoqueClass}">
                                        ${produto.estoque} unidades
                                    </span>
                                </td>
                                <td>
                                    <span class="status ${statusClass}">
                                        ${statusLabel}
                                    </span>
                                </td>
                                <td class="actions">
                                    <a href="/produtos/${produto.id}/editar" class="btn btn-warning btn-small">Editar</a>
                                    <button class="btn btn-danger btn-small btn-delete-product" data-product-id="${produto.id}">Deletar</button>
                                </td>
                            `;
                            tbody.appendChild(tr);
                        });

                        document.querySelectorAll('.btn-delete-product').forEach(btn => {
                            btn.onclick = async function() {
                                const productId = this.dataset.productId;
                                if (confirm('Tem certeza que deseja deletar este produto?')) {
                                    try {
                                        await apiService.deletarProduto(productId);
                                        alert('Produto deletado com sucesso!');
                                        carregarProdutos();
                                    } catch (error) {
                                           alert('Erro ao deletar:\n' + (error?.message || String(error)));
                                    }
                                }
                            };
                        });
                    } else {
                        tableContainer.style.display = 'none';
                        emptyState.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Erro:', error);
                       if (loading) loading.innerHTML = `<p style="color:red">Erro ao carregar: ${error?.message || String(error)}</p>`;
                }
            }

            carregarProdutos();
        </script>
    </main>
</body>
</html>
