<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Clientes</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/cliente.css">
</head>

<body>
    <div class="container fade-in">
        <header>
            <h1>Gerenciamento de Pedidos</h1>
            <nav>
                <ul>
                    <li><a href="/index.html">Início</a></li>
                    <li><a href="/views/pedidos/listar.view.html">Pedidos</a></li>
                    <li><a href="/views/produtos/listar.view.html">Produtos</a></li>
                    <li><a href="/views/clientes/listar.view.html" class="active">Clientes</a></li>
                    <li><a href="/views/itens/listar.view.html">Itens Pedidos</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="clientes-section">
                <div class="section-header">
                    <h2>Lista de Clientes</h2>
                    <a href="/views/clientes/cadastrar.view.html" class="btn btn-primary">+ Novo Cliente</a>
                </div>

                <div class="table-container" style="display: none;">
                    <table class="table table-clientes">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Contato</th>
                                <th>Documento</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Renderizado via JS -->
                        </tbody>
                    </table>
                </div>

                <div class="empty-state" style="display: none;">
                    <p>Nenhum cliente cadastrado.</p>
                    <a href="/views/clientes/cadastrar.view.html" class="btn btn-primary">Criar Cliente</a>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Sistema de Gerenciamento de Pedidos. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script type="module">
        import apiService from '/js/api.service.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.querySelector('.table-clientes tbody');
            const emptyState = document.querySelector('.empty-state');
            const tableContainer = document.querySelector('.table-container');

            try {
                const clientes = await apiService.listarClientes();

                if (clientes && clientes.length > 0) {
                    if (emptyState) emptyState.style.display = 'none';
                    if (tableContainer) tableContainer.style.display = 'block';

                    let html = '';
                    clientes.forEach(cliente => {
                        html += `
                             <tr>
                                 <td>${cliente.idCliente}</td>
                                 <td>${cliente.nomeCliente}</td>
                                 <td>${cliente.contato}</td>
                                 <td>${cliente.documento}</td>
                                 <td class="actions">
                                     <a href="/views/clientes/${cliente.idCliente}/editar" class="btn btn-warning btn-small">Editar</a>
                                     <button class="btn btn-danger btn-small delete-btn" data-id="${cliente.idCliente}">Deletar</button>
                                 </td>
                             </tr>
                         `;
                    });

                    if (tableBody) {
                        tableBody.innerHTML = html;
                        attachDeleteListeners();
                    }
                } else {
                    if (tableContainer) tableContainer.style.display = 'none';
                    if (emptyState) emptyState.style.display = 'block';
                }
            } catch (error) {
                console.error('Erro ao carregar clientes:', error);
                alert('Erro ao carregar a lista de clientes: ' + error.message);
            }
        });

        function attachDeleteListeners() {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async function () {
                    const id = this.dataset.id;
                    if (confirm('Confirmar exclusão deste cliente?')) {
                        try {
                            await apiService.deletarCliente(id);
                            alert('Cliente deletado com sucesso!');
                            location.reload();
                        } catch (error) {
                            console.error('Erro:', error);
                            alert('Erro ao deletar cliente: ' + error.message);
                        }
                    }
                });
            });
        }
    </script>
</body>

</html>
