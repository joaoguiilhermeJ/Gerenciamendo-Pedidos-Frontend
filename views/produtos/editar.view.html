<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/produto.css">
</head>

<body>
    <div class="container fade-in">
        <header>
            <h1>Gerenciamento de Pedidos</h1>
            <nav>
                <ul>
                    <li><a href="/index.html">Início</a></li>
                    <li><a href="/views/pedidos/listar.view.html">Pedidos</a></li>
                    <li><a href="/views/produtos/listar.view.html" class="active">Produtos</a></li>
                    <li><a href="/views/clientes/listar.view.html">Clientes</a></li>
                    <li><a href="/views/itens/listar.view.html">Itens Pedidos</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="produtos-section">
                <div class="section-header">
                    <h2>Editar Produto #<span id="titulo-id-produto"></span></h2>
                </div>

                <form class="form-produto" id="formProduto">
                    <div class="form-group">
                        <label for="nome">Nome do Produto:</label>
                        <input type="text" id="nome" name="nome" required placeholder="Digite o nome do produto">
                    </div>

                    <div class="form-group">
                        <label for="categoria">Categoria:</label>
                        <input type="text" id="categoria" name="categoria" placeholder="Ex: Bebidas, Alimentos">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="preco">Preço (R$):</label>
                            <input type="number" id="preco" name="preco" min="0" step="0.01" required
                                placeholder="0.00">
                        </div>

                        <div class="form-group">
                            <label for="estoque">Estoque:</label>
                            <input type="number" id="estoque" name="estoque" min="0" required placeholder="0">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                        <a href="/views/produtos/listar.view.html" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Sistema de Gerenciamento de Pedidos. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script type="module">
        import apiService from '/js/api.service.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const idProduto = urlParams.get('id');

            if (!idProduto) {
                alert('ID do produto não informado');
                window.location.href = '/views/produtos/listar.view.html';
                return;
            }

            try {
                const produto = await apiService.buscarProduto(idProduto);

                document.getElementById('titulo-id-produto').textContent = idProduto;
                document.getElementById('nome').value = produto.nome || '';
                document.getElementById('preco').value = Number(produto.preco || 0).toFixed(2);
                document.getElementById('estoque').value = produto.estoque || 0;
                document.getElementById('categoria').value = produto.categoria || '';

                document.getElementById('formProduto').addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const nome = document.getElementById('nome').value.trim();
                    const preco = parseFloat(document.getElementById('preco').value);
                    const estoque = parseInt(document.getElementById('estoque').value);
                    const categoria = document.getElementById('categoria').value.trim();

                    if (!nome || isNaN(preco) || preco < 0) {
                        alert('Por favor, preencha o nome e um preço válido.');
                        return;
                    }

                    const dados = { nome, preco, estoque: isNaN(estoque) ? 0 : estoque, categoria };

                    try {
                        await apiService.atualizarProduto(idProduto, dados);
                        alert('Produto atualizado com sucesso!');
                        window.location.href = '/views/produtos/listar.view.html';
                    } catch (error) {
                        alert('Erro ao atualizar: ' + error.message);
                    }
                });

            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao carregar produto: ' + error.message);
            }
        });

        document.getElementById('preco').addEventListener('blur', function (e) {
            let value = parseFloat(e.target.value);
            if (!isNaN(value)) {
                e.target.value = Number(value).toFixed(2);
            }
        });
    </script>
</body>

</html>
