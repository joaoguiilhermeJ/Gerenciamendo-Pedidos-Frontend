<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Produtos</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/produto.css">
</head>

<body>
    <div class="container fade-in">
        <header>
            <h1>Gerenciamento de Pedidos</h1>
            <nav>
                <ul>
                    <li><a href="/index.html">Início</a></li>
                    <li><a href="/views/pedidos/listar.view.html">Pedidos</a></li>
                    <li><a href="/views/produtos/listar.view.html" class="active">Produtos</a></li>
                    <li><a href="/views/clientes/listar.view.html">Clientes</a></li>
                    <li><a href="/views/itens/listar.view.html">Itens Pedidos</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="produtos-section">
                <div class="section-header">
                    <h2>Lista de Produtos</h2>
                    <a href="/views/produtos/cadastrar.view.html" class="btn btn-primary">+ Novo Produto</a>
                </div>

                <div class="table-container" style="display: none;">
                    <table class="table table-produtos">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Preço</th>
                                <th>Estoque</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Renderizado via JS -->
                        </tbody>
                    </table>
                </div>

                <div class="empty-state" style="display: none;">
                    <p>Nenhum produto cadastrado.</p>
                    <a href="/views/produtos/cadastrar.view.html" class="btn btn-primary">Criar Primeiro Produto</a>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Sistema de Gerenciamento de Pedidos. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script type="module">
        import apiService from '/js/api.service.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.querySelector('.table-produtos tbody');
            const emptyState = document.querySelector('.empty-state');
            const tableContainer = document.querySelector('.table-container');

            try {
                const produtos = await apiService.listarProdutos();

                if (produtos && produtos.length > 0) {
                    if (emptyState) emptyState.style.display = 'none';
                    if (tableContainer) tableContainer.style.display = 'block';

                    let html = '';
                    produtos.forEach(produto => {
                        html += `
                        <tr>
                            <td>${produto.idProduto}</td>
                            <td>${produto.nome}</td>
                            <td>R$ ${Number(produto.preco || 0).toFixed(2)}</td>
                            <td>
                                <span class="estoque ${(produto.estoque || 0) > 0 ? 'estoque-disponivel' : 'estoque-indisponivel'}">
                                    ${produto.estoque || 0} unidades
                                </span>
                            </td>
                            <td class="actions">
                                <a href="/views/produtos/editar.view.html?id=${produto.idProduto}" class="btn btn-warning btn-small">Editar</a>
                                <button class="btn btn-danger btn-small btn-delete-product"
                                    data-product-id="${produto.idProduto}">Deletar</button>
                            </td>
                        </tr>
                        `;
                    });

                    if (tableBody) {
                        tableBody.innerHTML = html;
                        attachDeleteListeners();
                    }
                } else {
                    if (tableContainer) tableContainer.style.display = 'none';
                    if (emptyState) emptyState.style.display = 'block';
                }
            } catch (error) {
                console.error('Erro ao carregar produtos:', error);
                alert('Erro ao carregar a lista de produtos: ' + error.message);
            }
        });

        function attachDeleteListeners() {
            document.querySelectorAll('.btn-delete-product').forEach(btn => {
                btn.addEventListener('click', async function () {
                    const productId = this.dataset.productId;
                    if (confirm('Tem certeza que deseja deletar este produto?')) {
                        try {
                            await apiService.deletarProduto(productId);
                            alert('Produto deletado com sucesso!');
                            location.reload();
                        } catch (error) {
                            console.error('Erro:', error);
                            alert('Erro ao deletar produto: ' + error.message);
                        }
                    }
                });
            });
        }
    </script>
</body>

</html>
